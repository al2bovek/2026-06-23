databases:
  - name: app-db
    plan: free
    databaseName: appdb
    user: app

services:
  - type: web
    name: app-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PG_HOST
        fromDatabase:
          name: app-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: app-db
          property: port
      - key: PG_USER
        fromDatabase:
          name: app-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: app-db
          property: password
      - key: PG_DATABASE
        fromDatabase:
          name: app-db
          property: database
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false

  - type: web
    name: app-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
